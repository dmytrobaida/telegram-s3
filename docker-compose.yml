services:
  telegram-s3:
    image: ghcr.io/YOUR_GITHUB_OWNER/YOUR_REPOSITORY:latest
    container_name: telegram-s3
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      METADATA_FILE: /data/metadata.json
      TELEGRAM_PART_SIZE: ${TELEGRAM_PART_SIZE:-47185920}
      MAX_OBJECT_SIZE: ${MAX_OBJECT_SIZE:-500mb}
    volumes:
      - telegram-s3-data:/data

volumes:
  telegram-s3-data:
