name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version and image name
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Check whether package version changed
        id: version-check
        shell: bash
        run: |
          SHOULD_BUILD="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref_type }}" == "tag" ]]; then
            SHOULD_BUILD="true"
          else
            BEFORE_VERSION=""
            if git cat-file -e "${{ github.event.before }}:package.json" 2>/dev/null; then
              BEFORE_VERSION=$(git show "${{ github.event.before }}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
            fi

            if [[ -z "$BEFORE_VERSION" || "$BEFORE_VERSION" != "${{ steps.package.outputs.version }}" ]]; then
              SHOULD_BUILD="true"
            fi
          fi

          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"
          echo "should_build=${SHOULD_BUILD}"

      - name: Skip reason
        if: steps.version-check.outputs.should_build != 'true'
        run: echo "Skipping Docker build because package.json version did not change."

      - name: Set up Docker Buildx
        if: steps.version-check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.version-check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.version-check.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.package.outputs.image }}:${{ steps.package.outputs.version }}
            ${{ steps.package.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
